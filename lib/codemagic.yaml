workflows:
  android-debug:
    name: ThingsBoard Android Debug
    max_build_duration: 60
    environment:
      flutter: 3.24.4
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK debug
        script: |
          flutter build apk \
            --debug \
            --no-tree-shake-icons \
            --dart-define=thingsboardApiEndpoint=http://198.168.0.109:9090 \
            --dart-define=thingsboardOAuth2CallbackUrlScheme=tb://mytbapp.com/oauth2/callback \
            --dart-define=thingsboardAndroidAppSecret= \
            --dart-define=thingsboardIOSAppSecret=
    artifacts:
      - build/**/outputs/**/*.apk
