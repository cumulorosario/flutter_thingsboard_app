workflows:
  android-release:
    name: ThingsBoard Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.29.2
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK release
        script: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --dart-define=thingsboardApiEndpoint=http://cumuloingenieria.duckdns.org:9090/ \
            --dart-define=thingsboardOAuth2CallbackUrlScheme=tb://mytbapp.com/oauth2/callback \
            --dart-define=thingsboardAndroidAppSecret= \
            --dart-define=thingsboardIOSAppSecret=
    artifacts:
      - build/**/outputs/**/*.apk
