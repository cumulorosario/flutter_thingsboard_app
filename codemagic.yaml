workflows:
  android-debug:
    name: ThingsBoard Android Debug
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: 3.29.2   # Dart 3.7.x — satisface sdk: ^3.7.0
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK debug
        script: |
          flutter build apk \
            --debug \
            --no-tree-shake-icons \
            --dart-define=thingsboardApiEndpoint=http://198.168.0.109:9090 \
            --dart-define=thingsboardOAuth2CallbackUrlScheme=tb://mytbapp.com/oauth2/callback \
            --dart-define=thingsboardAndroidAppSecret= \
            --dart-define=thingsboardIOSAppSecret=
    artifacts:
      - build/**/outputs/**/*.apk
